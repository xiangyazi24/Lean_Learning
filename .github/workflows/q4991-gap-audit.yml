name: q4991-gap-audit

on:
  push:
    branches: [q4991-gap-audit-temp]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install GAP packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gap gap-transgrp
      - name: Run independent Q4991 audit
        run: |
          gap -q -b q4991_audit.g | tee q4991-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: q4991-output
          path: q4991-output.txt
