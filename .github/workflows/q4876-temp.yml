name: Q4876 temporary numerical run

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/q4876-temp.yml']
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install mpmath
      - name: Fetch and run exact verifier
        run: |
          curl --fail --location https://raw.githubusercontent.com/xiangyazi24/Shen_work/q4876-jacobi-test/scripts/q4876_jacobi_test.py -o /tmp/q4876.py
          python /tmp/q4876.py | tee q4876-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: q4876-output
          path: q4876-output.txt
